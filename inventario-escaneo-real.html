<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Inventario">
    <title>🍾 Inventario Alcoholes - El Paso Guamasa</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            height: 100vh;
            max-width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #92400e 0%, #b45309 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .header p {
            font-size: 11px;
            opacity: 0.9;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            background: white;
            border-bottom: 2px solid #fcd34d;
            flex-shrink: 0;
        }

        .stat-box {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box.products { background: #dbeafe; color: #1e40af; }
        .stat-box.units { background: #dcfce7; color: #166534; }
        .stat-box.percentage { background: #f3e8ff; color: #7e22ce; }

        .stat-box .number {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-box .label {
            font-size: 10px;
            font-weight: 600;
        }

        /* Scanner View */
        .scanner-view {
            display: none;
            flex: 1;
            background: black;
            position: relative;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .scanner-view.active {
            display: flex;
        }

        video {
            width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            aspect-ratio: 1;
            border: 3px solid #fbbf24;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(251, 191, 36, 0.3);
            pointer-events: none;
        }

        .scanner-controls {
            position: absolute;
            bottom: 20px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 10px;
        }

        /* Input Section */
        .input-section {
            padding: 12px;
            background: white;
            border-bottom: 2px solid #fcd34d;
            flex-shrink: 0;
            display: none;
        }

        .input-section.active {
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #fcd34d;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: #b45309;
            background: #fffbeb;
        }

        input[type="number"] {
            flex: 0.4;
        }

        .btn-add {
            padding: 12px 16px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        /* Quick actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px;
            background: white;
            border-bottom: 2px solid #fcd34d;
            flex-shrink: 0;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-scan { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-manual { background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%); }
        .btn-export { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .btn-clear { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-stop { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); width: 100%; }

        /* Items List */
        .items-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #fafafa;
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 40px 20px;
            font-size: 14px;
        }

        .item {
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            border-left: 4px solid #b45309;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-weight: 700;
            font-size: 13px;
            color: #1f2937;
            word-break: break-word;
            margin-bottom: 3px;
        }

        .item-code {
            font-size: 11px;
            color: #6b7280;
            font-family: monospace;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            border-radius: 6px;
            padding: 2px;
            flex-shrink: 0;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .qty-btn.minus { background: #ef4444; }
        .qty-btn.plus { background: #22c55e; }
        .qty-btn.delete { background: #9ca3af; }

        .qty-display {
            font-weight: 700;
            font-size: 16px;
            color: #b45309;
            min-width: 32px;
            text-align: center;
        }

        /* Footer */
        .footer {
            background: #fef3c7;
            padding: 10px 12px;
            text-align: center;
            border-top: 2px solid #fcd34d;
            font-size: 11px;
            color: #92400e;
            flex-shrink: 0;
        }

        .footer p {
            margin: 2px 0;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            z-index: 1000;
            animation: slideUp 0.3s ease, slideDown 0.3s ease 2.7s;
            pointer-events: none;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(20px); opacity: 0; }
        }

        .items-list::-webkit-scrollbar {
            width: 5px;
        }

        .items-list::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        .items-list::-webkit-scrollbar-thumb {
            background: #d4a574;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🍾 Inventario Alcoholes</h1>
            <p>El Paso Guamasa - Escanea códigos</p>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-box products">
                <div class="number" id="productsCount">0</div>
                <div class="label">Productos</div>
            </div>
            <div class="stat-box units">
                <div class="number" id="unitsCount">0</div>
                <div class="label">Unidades</div>
            </div>
            <div class="stat-box percentage">
                <div class="number" id="percentageCount">0%</div>
                <div class="label">Capturados</div>
            </div>
        </div>

        <!-- Scanner View -->
        <div class="scanner-view" id="scannerView">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
            <div class="scanner-overlay"></div>
            <div class="scanner-controls">
                <button class="btn-stop" onclick="stopScanning()">⏹️ CERRAR ESCANEO</button>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section" id="inputSection">
            <div class="input-group">
                <input 
                    type="text" 
                    id="codeInput" 
                    placeholder="Código de barras" 
                    autocomplete="off"
                    inputmode="numeric"
                />
                <input 
                    type="number" 
                    id="qtyInput" 
                    placeholder="Cant." 
                    min="1" 
                    value="1"
                />
            </div>
            <button class="btn-add" onclick="addProduct()">➕ AGREGAR</button>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="btn-scan" onclick="startScanning()">📷 ESCANEAR</button>
            <button class="btn-manual" onclick="toggleManual()">✍️ MANUAL</button>
            <button class="btn-export" onclick="exportCSV()">📥 CSV</button>
        </div>

        <!-- Items List -->
        <div id="itemsList" class="items-list">
            <div class="empty-state">Sin elementos aún.<br>Escanea códigos de barras.</div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p id="footerText">Total: 0 unidades | 0 SKUs</p>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const TOTAL_ALCOHOLES = 1503;
        const DEMO_CODES = {
            '12323': 'GINEBRA STATUS INDICA TUNOS 70cl 40%',
            '13430': 'RON PLANTATION XO 20 AÑOS 70cl 40%',
            '1423': 'LICOR MELON BOLS 700ML',
            '1610': 'TEQUILA PATRON CAFE 70cl.',
            '244743': 'VINO TINTO COSECHERO 75cl.',
            '3018333000410': 'CHAMPAGNE PIPER HEIDSIECK 200cl 12%',
            '3043709000886': 'CHAMPAGNE MUMM ICE XTRA 75cl',
            '487': 'BRANDY JAIME I 70cl.',
            '5018481022003': 'WHISKY TOMATIN LEGACY 70CL 43º',
            '5018481100213': 'WHISKY TOMATIN 12 AÑOS 70cl 43º',
            '5114': 'WHISKY BALLANTINES 1L.',
            '5903': 'RON DIPLOMATICO RESERVA EXCLUSIVA 70cl.',
            '801195': 'WHISKY TEANINICH 8 AÑOS 70cl 60,3% SR26',
            '8148': 'RON CAMAGEY BLANCO 1L.',
            '1234567890123': 'VODKA SMIRNOFF 70CL',
            '9876543210987': 'RON HAVANA CLUB AÑEJO 7 AÑOS 75CL',
            '5555555555555': 'VINO BLANCO MARQUÉS DE RISCAL 75CL',
            '6666666666666': 'CERVEZA ESTRELLA DAMM PACK 6x330ML',
            '7777777777777': 'RON BARCELÓ GRAN AÑEJO 70CL',
            '8888888888888': 'WHISKY MACALLAN 18 AÑOS 70CL'
        };

        let scannedItems = [];
        let videoStream = null;
        let scanningActive = false;

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            updateStats();

            document.getElementById('codeInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addProduct();
            });
        });

        // ==================== STORAGE ====================
        function saveToStorage() {
            localStorage.setItem('inventoryData', JSON.stringify(scannedItems));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('inventoryData');
            if (saved) {
                try {
                    scannedItems = JSON.parse(saved);
                    renderItems();
                } catch (e) {
                    console.error('Error loading:', e);
                }
            }
        }

        // ==================== SCANNER ====================
        async function startScanning() {
            try {
                showToast('📷 Abriendo cámara...');
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                videoStream = stream;

                document.getElementById('scannerView').classList.add('active');
                document.getElementById('inputSection').classList.remove('active');
                document.getElementById('itemsList').style.display = 'none';

                scanningActive = true;
                showToast('✅ Escanea código de barras');
                scanBarcodes();

            } catch (err) {
                showToast('❌ Error: ' + err.name, true);
                if (err.name === 'NotAllowedError') {
                    showToast('🔧 Verifica permisos en Configuración', true);
                }
            }
        }

        function stopScanning() {
            scanningActive = false;
            if (videoStream) {
                videoStream.getTracks().forEach(t => t.stop());
            }
            document.getElementById('scannerView').classList.remove('active');
            document.getElementById('itemsList').style.display = 'block';
            showToast('✅ Escaneo cerrado');
        }

        function scanBarcodes() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            if (!scanningActive) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert'
                });

                if (code) {
                    const detected = code.data.trim();
                    processScannedCode(detected);
                    return;
                }
            }

            requestAnimationFrame(scanBarcodes);
        }

        // ==================== PROCESS CODE ====================
        function processScannedCode(code) {
            const productName = DEMO_CODES[code];
            if (!productName) {
                showToast('❌ No reconocido: ' + code, true);
                return;
            }

            const existing = scannedItems.find(i => i.codigo === code);
            if (existing) {
                existing.cantidad++;
            } else {
                scannedItems.push({
                    codigo: code,
                    nombre: productName,
                    cantidad: 1
                });
            }

            saveToStorage();
            renderItems();
            updateStats();
            showToast('✅ ' + productName.substring(0, 40));
        }

        // ==================== MANUAL INPUT ====================
        function toggleManual() {
            document.getElementById('inputSection').classList.toggle('active');
            if (document.getElementById('inputSection').classList.contains('active')) {
                document.getElementById('codeInput').focus();
            }
        }

        function addProduct() {
            const code = document.getElementById('codeInput').value.trim();
            const qty = parseInt(document.getElementById('qtyInput').value) || 1;

            if (!code) {
                showToast('⚠️ Ingresa código', true);
                return;
            }

            const productName = DEMO_CODES[code];
            if (!productName) {
                showToast('❌ Código no encontrado: ' + code, true);
                return;
            }

            const existing = scannedItems.find(i => i.codigo === code);
            if (existing) {
                existing.cantidad += qty;
            } else {
                scannedItems.push({
                    codigo: code,
                    nombre: productName,
                    cantidad: qty
                });
            }

            saveToStorage();
            renderItems();
            updateStats();
            showToast('✅ ' + productName.substring(0, 40));

            document.getElementById('codeInput').value = '';
            document.getElementById('qtyInput').value = '1';
            document.getElementById('codeInput').focus();
        }

        // ==================== ITEMS ====================
        function updateQty(code, delta) {
            const item = scannedItems.find(i => i.codigo === code);
            if (!item) return;

            item.cantidad += delta;
            if (item.cantidad <= 0) {
                removeItem(code);
            } else {
                saveToStorage();
                renderItems();
                updateStats();
            }
        }

        function removeItem(code) {
            scannedItems = scannedItems.filter(i => i.codigo !== code);
            saveToStorage();
            renderItems();
            updateStats();
        }

        function renderItems() {
            const container = document.getElementById('itemsList');
            if (scannedItems.length === 0) {
                container.innerHTML = '<div class="empty-state">Sin elementos aún.<br>Escanea códigos de barras.</div>';
                return;
            }

            container.innerHTML = scannedItems.map(item => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-title">${item.nombre.substring(0, 50)}</div>
                        <div class="item-code">📦 ${item.codigo}</div>
                    </div>
                    <div class="item-controls">
                        <button class="qty-btn minus" onclick="updateQty('${item.codigo}', -1)">−</button>
                        <span class="qty-display">${item.cantidad}</span>
                        <button class="qty-btn plus" onclick="updateQty('${item.codigo}', 1)">+</button>
                        <button class="qty-btn delete" onclick="removeItem('${item.codigo}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = scannedItems.length;
            const units = scannedItems.reduce((sum, i) => sum + i.cantidad, 0);
            const pct = ((total / TOTAL_ALCOHOLES) * 100).toFixed(1);

            document.getElementById('productsCount').textContent = total;
            document.getElementById('unitsCount').textContent = units;
            document.getElementById('percentageCount').textContent = pct + '%';
            document.getElementById('footerText').textContent = `Total: ${units} unidades | ${total} SKUs`;
        }

        // ==================== EXPORT ====================
        function exportCSV() {
            if (scannedItems.length === 0) {
                showToast('⚠️ No hay datos', true);
                return;
            }

            const headers = ['Código', 'Descripción', 'Cantidad'];
            const rows = scannedItems.map(item => [
                item.codigo,
                `"${item.nombre}"`,
                item.cantidad
            ]);

            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `inventario-alcoholes-${new Date().toISOString().split('T')[0]}.csv`);
            link.click();

            showToast('✅ CSV descargado');
        }

        // ==================== TOAST ====================
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
