<html lang="es">
<head>

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; overflow: hidden; }

        .header {
            background: linear-gradient(135deg, #92400e 0%, #b45309 100%);
            color: white;
            padding: 10px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 { font-size: 16px; margin: 2px 0; }
        .header p { font-size: 9px; opacity: 0.9; }
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            border-bottom: 2px solid #fcd34d;
            flex-shrink: 0;
        }
        
        .tab {
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #666;
        }
        
        .tab.active {
            color: #b45309;
            border-bottom-color: #b45309;
        }
        
        .view { display: none; flex: 1; flex-direction: column; }
        .view.active { display: flex; }
        
        #cameraView { background: #000; }
        
        .camera-display {
            flex: 1;
            background: #000;
            position: relative;
        }
        
        #videoStream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .button-bar {
            background: #000;
            padding: 15px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
            border-top: 2px solid #fcd34d;
        }
        
        .btn-large {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff6b35 0%, #ff4500 100%);
            box-shadow: 0 0 20px rgba(255, 75, 0, 0.8);
            transition: all 0.2s;
        }
        
        .btn-large:active { transform: scale(0.9); }
        
        canvas { display: none; }
        
        .edit-view {
            overflow-y: auto;
            padding: 15px;
            background: white;
        }
        
        .edit-image {
            width: 100%;
            max-height: 180px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #fcd34d;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 4px;
            color: #1f2937;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #fcd34d;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #b45309;
            background: #fffbeb;
        }
        
        .status {
            padding: 8px;
            margin-bottom: 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        
        .status.show { display: block; }
        .status.loading { background: #fef08a; color: #854d0e; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #991b1b; }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        
        .btn-save { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .btn-cancel { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn:active { transform: scale(0.95); }
        
        .inventory-view { background: white; display: flex; flex-direction: column; }
        
        .inventory-header {
            padding: 12px;
            background: #faf8f3;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }
        
        .inventory-header h2 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .stat {
            padding: 6px;
            background: white;
            border-left: 3px solid #fcd34d;
            font-size: 11px;
        }
        
        .stat-value { font-weight: 700; font-size: 16px; color: #b45309; }
        
        .inventory-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .item {
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #b45309;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .item:active { transform: scale(0.98); }
        
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 13px; color: #1f2937; word-break: break-word; }
        .item-code { font-size: 10px; color: #6b7280; margin-top: 2px; }
        .item-qty { font-weight: 700; font-size: 18px; color: #22c55e; min-width: 40px; text-align: center; }
        
        .empty-state { padding: 40px 20px; text-align: center; color: #9ca3af; font-size: 12px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .modal-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; color: #1f2937; }
        .modal-code { font-size: 11px; color: #6b7280; margin-bottom: 12px; font-family: monospace; background: #f0f0f0; padding: 6px; border-radius: 4px; }
        
        .qty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: none;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-minus { background: #ef4444; color: white; }
        .qty-plus { background: #22c55e; color: white; }
        .qty-display { width: 60px; text-align: center; font-weight: 700; font-size: 24px; color: #b45309; border: 2px solid #fcd34d; padding: 8px; border-radius: 6px; }
        
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .modal-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .modal-save { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .modal-delete { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        
        .footer {
            background: linear-gradient(135deg, #92400e 0%, #b45309 100%);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 11px;
            flex-shrink: 0;
            border-top: 2px solid #fcd34d;

            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            margin-top: 6px;

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Inventario Profesional</h1>
            <p>El Paso Guamasa - 1316 alcoholes</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('camera')">📷 FOTOGRAFIAR</div>
            <div class="tab" onclick="showTab('inventory')">📊 INVENTARIO</div>
        </div>
        
        <div class="view active" id="cameraView">
            <div class="camera-display">
                <video id="videoStream" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
            </div>
            <div class="button-bar">
                <button class="btn-large" onclick="capturePhoto()">📸</button>
            </div>
        </div>
        
        <div class="view" id="editView">
            <div class="edit-view">
                <img id="photoImg" class="edit-image" />
                <div id="statusMsg" class="status loading">Analizando...</div>
                
                <div class="form-group">
                    <label>📦 Código de Barras</label>
                    <input type="text" id="inpCode" placeholder="Código">
                </div>
                
                <div class="form-group">
                    <label>🍾 Nombre Producto</label>
                    <input type="text" id="inpName" placeholder="Nombre">
                </div>
                
                <div class="form-group">
                    <label>📊 Cantidad</label>
                    <input type="number" id="inpQty" placeholder="Cantidad" value="1" min="1">
                </div>
                
                <div class="button-group">
                    <button class="btn btn-save" onclick="saveItem()">✅ GUARDAR</button>
                    <button class="btn btn-cancel" onclick="cancelEdit()">❌ CANCELAR</button>
                </div>
            </div>
        </div>
        
        <div class="view" id="inventoryView">
            <div class="inventory-view">
                <div class="inventory-header">
                    <h2>Toma Física Unificada</h2>
                    <div class="stats-row">
                        <div class="stat">SKUs: <span class="stat-value" id="totalSKUs">0</span></div>
                        <div class="stat">Botellas: <span class="stat-value" id="totalBtls">0</span></div>
                    </div>
                </div>
                <div class="inventory-list" id="inventoryList">
                    <div class="empty-state">Sin elementos. Fotografía botellas.</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p id="footerMsg">Listo para fotografiar</p>
            <button class="btn-export" onclick="exportCSV()">📥 DESCARGAR CSV</button>
        </div>
    </div>
    
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Editar Cantidad</div>
            <div class="modal-code" id="modalCode"></div>
            
            <div class="qty-control">
                <button class="qty-btn qty-minus" onclick="decreaseQty()">−</button>
                <input type="number" class="qty-display" id="modalQty" value="1" min="1">
                <button class="qty-btn qty-plus" onclick="increaseQty()">+</button>
            </div>
            
            <div class="modal-buttons">
                <button class="modal-btn modal-save" onclick="saveEditQty()">✅ GUARDAR</button>
                <button class="modal-btn modal-delete" onclick="deleteItem()">🗑️ ELIMINAR</button>
            </div>
            <button class="modal-btn" style="width: 100%; background: #6b7280; margin-top: 8px;" onclick="closeModal()">❌ CANCELAR</button>
        </div>
    </div>

        let items = [];
        let editingIndex = -1;
        
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            initCamera();
            document.getElementById('editModal').addEventListener('click', (e) => {
                if (e.target.id === 'editModal') closeModal();
            });
        });
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                document.getElementById('videoStream').srcObject = stream;
            } catch (e) {
                alert('Error cámara: ' + e.name);
            }
        }
        
        function capturePhoto() {
            const video = document.getElementById('videoStream');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            document.getElementById('photoImg').src = canvas.toDataURL('image/jpeg');
            showTab('edit');
            analyzeCode(canvas);
        }
        
        function analyzeCode(canvas) {
            const status = document.getElementById('statusMsg');
            status.classList.add('show', 'loading');
            status.textContent = 'Analizando código...';
            
            Quagga.decodeSingle({
                src: canvas.toDataURL('image/jpeg'),
                numOfWorkers: 1,
                inputStream: { size: 800 },
                decoder: { readers: ['ean_reader', 'code_128_reader', 'ean_8_reader', 'code_39_reader', 'upc_reader'] }
            }, (result) => {
                if (result && result.codeResult) {
                    const code = result.codeResult.code;
                    const name = PRODUCTOS[code] || '';
                    document.getElementById('inpCode').value = code;
                    document.getElementById('inpName').value = name;
                    status.className = 'status success show';
                    status.textContent = '✅ Código: ' + code;
                } else {
                    status.className = 'status error show';
                    status.textContent = '❌ No detectado. Completa manualmente.';
                }
                setTimeout(() => { status.classList.remove('show'); }, 2000);
            });
        }
        
        function saveItem() {
            const code = document.getElementById('inpCode').value.trim();
            const name = document.getElementById('inpName').value.trim();
            const qty = parseInt(document.getElementById('inpQty').value) || 1;
            
            if (!code || !name) { alert('Completa código y nombre'); return; }
            if (name.toLowerCase() === 'desconocido') {
                alert('❌ Debes identificar el producto. No puedes guardar como "Desconocido"');
                return;
            }
            
            const existing = items.find(i => i.code === code);
            if (existing) {
                existing.qty += qty;
            } else {
                items.push({ code, name, qty });
            }
            
            saveData();
            updateStats();
            renderList();
            cancelEdit();
            beep();
        }
        
        function cancelEdit() {
            showTab('camera');
            document.getElementById('inpCode').value = '';
            document.getElementById('inpName').value = '';
            document.getElementById('inpQty').value = '1';
        }
        
        function beep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        }
        
        function saveData() {
            localStorage.setItem('inv', JSON.stringify(items));
        }
        
        function loadData() {
            const saved = localStorage.getItem('inv');
            if (saved) items = JSON.parse(saved);
            renderList();
            updateStats();
        }
        
        function updateStats() {
            const skus = items.length;
            const btls = items.reduce((s, i) => s + i.qty, 0);
            document.getElementById('totalSKUs').textContent = skus;
            document.getElementById('totalBtls').textContent = btls;
            document.getElementById('footerMsg').textContent = `${skus} productos | ${btls} botellas`;
        }
        
        function renderList() {
            const list = document.getElementById('inventoryList');
            if (!items.length) {
                list.innerHTML = '<div class="empty-state">Sin elementos. Fotografía botellas.</div>';
                return;
            }
            list.innerHTML = items
                .sort((a, b) => b.qty - a.qty)
                .map((i, idx) => `
                    <div class="item" onclick="openEditModal(${idx})">
                        <div class="item-info">
                            <div class="item-name">${i.name.substring(0, 40)}</div>
                            <div class="item-code">📦 ${i.code}</div>
                        </div>
                        <div class="item-qty">${i.qty}</div>
                    </div>
                `).join('');
        }
        
        function exportCSV() {
            if (!items.length) { alert('Sin datos'); return; }
            const csv = 'Código,Descripción,Cantidad\n' + 
                items.map(i => `${i.code},"${i.name}",${i.qty}`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inv-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        function showTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'camera') {
                document.getElementById('cameraView').classList.add('active');
                document.querySelector('.tab:nth-child(1)').classList.add('active');
            } else if (tab === 'inventory') {
                document.getElementById('inventoryView').classList.add('active');
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                updateStats();
                renderList();
            } else if (tab === 'edit') {
                document.getElementById('editView').classList.add('active');
            }
        }
        
        function openEditModal(idx) {
            editingIndex = idx;
            const item = items[idx];
            document.getElementById('modalTitle').textContent = item.name.substring(0, 35);
            document.getElementById('modalCode').textContent = '📦 ' + item.code;
            document.getElementById('modalQty').value = item.qty;
            document.getElementById('editModal').classList.add('active');
        }
        
        function increaseQty() {
            const input = document.getElementById('modalQty');
            input.value = parseInt(input.value) + 1;
        }
        
        function decreaseQty() {
            const input = document.getElementById('modalQty');
            const val = Math.max(1, parseInt(input.value) - 1);
            input.value = val;
        }
        
        function saveEditQty() {
            if (editingIndex < 0) return;
            const newQty = parseInt(document.getElementById('modalQty').value) || 1;
            items[editingIndex].qty = Math.max(1, newQty);
            saveData();
            updateStats();
            renderList();
            closeModal();
            beep();
        }
        
        function deleteItem() {
            if (editingIndex < 0) return;
            items.splice(editingIndex, 1);
            saveData();
            updateStats();
            renderList();
            closeModal();
        }
        
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
        }
    </script>
